<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>农智云播 - 工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #f0f7f0;
        font-family: "Inter", sans-serif;
      }
      .sidebar-active {
        background-color: #d4e9d4;
        color: #2e7d32;
      }
      .process-connector {
        position: absolute;
        top: 28px;
        left: 40px;
        width: 16px;
        height: 2px;
        background-color: #a5d6a7;
      }
      .process-card {
        border-left: 4px solid transparent;
        transition: all 0.3s ease;
      }
      .process-card.pending {
        border-left-color: #81c784;
        background-color: #f9fcf9;
      }
      .process-card.running {
        border-left-color: #43a047;
        background-color: #e8f5e9;
      }
      .process-card.completed {
        border-left-color: #2e7d32;
        background-color: #e8f5e9;
      }
      .upload-area:hover {
        border-color: #43a047 !important;
      }
      .agri-btn {
        background-color: #2e7d32 !important;
      }
      .agri-btn:hover {
        background-color: #1b5e20 !important;
        box-shadow: 0 10px 15px -3px rgba(46, 125, 50, 0.1) !important;
      }
      .status-tag {
        background-color: #e8f5e9 !important;
        color: #2e7d32 !important;
      }
      .purple-btn {
        background-color: #e8d5f0;
        color: #6b21a8;
        transition: background-color 0.2s;
      }
      .purple-btn:hover {
        background-color: #d8b4fe;
      }
      .platform-card input[type="checkbox"]:checked + label {
        border-color: #2e7d32;
        background-color: #e8f5e9;
        color: #2e7d32;
      }
      .platform-card label {
        border: 2px solid #e5e7eb;
        transition: all 0.2s;
      }
      .platform-card label:hover {
        border-color: #81c784;
      }
      .publish-btn {
        background-color: #2e7d32;
        color: #ffffff;
        transition: all 0.3s;
      }
      .publish-btn:hover {
        background-color: #1b5e20;
        box-shadow: 0 10px 15px -3px rgba(46, 125, 50, 0.1);
      }
      .cover-preview {
        background: linear-gradient(135deg, #f0f7f0 0%, #f5f0fa 100%);
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .toast-anim {
        animation: fadeInUp 0.3s ease;
      }
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(17, 24, 39, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loading-card {
        min-width: 260px;
        max-width: 86vw;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        padding: 22px 20px;
        text-align: center;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 10px;
        border: 4px solid #d1fae5;
        border-top-color: #16a34a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="h-screen flex overflow-hidden">
    <!-- 侧边栏 -->
    <aside
      class="w-64 bg-white border-r border-gray-100 flex flex-col p-4 flex-shrink-0"
    >
      <div class="flex items-center mb-10 px-2 mt-2">
        <span class="text-2xl font-bold text-gray-800 tracking-wider"
          >农智云播</span
        >
      </div>
      <nav class="space-y-1">
        <a
          href="#"
          id="nav_agent"
          class="sidebar-active flex items-center space-x-3 p-3 rounded-xl font-medium"
        >
          <i class="fas fa-robot"></i><span>智能体</span>
        </a>
      </nav>
    </aside>
  </body>
</html>

<!-- 视图：智能体 -->
<div id="view_agent" class="flex flex-1 overflow-hidden">
  <main
    class="w-96 bg-white border-r border-gray-100 flex flex-col p-6 overflow-y-auto flex-shrink-0"
  >
    <h2 class="text-lg font-bold text-gray-800 mb-6">配置任务</h2>
    <div class="mb-8">
      <label class="block text-sm font-semibold text-gray-700 mb-3">
        <span class="text-red-500">*</span> 上传参考照片
      </label>
      <div
        class="upload-area border-2 border-dashed border-gray-300 rounded-xl p-8 flex flex-col items-center justify-center transition-colors cursor-pointer bg-gray-50"
        onclick="document.getElementById('photo_file').click()"
      >
        <img
          id="upload_preview"
          class="hidden w-full max-h-52 object-contain rounded-lg mb-3"
          alt="上传图片预览"
        />
        <i
          class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"
          id="upload_icon"
        ></i>
        <p class="text-sm text-gray-500" id="upload_text">
          点击或拖拽照片至此处
        </p>
        <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG 格式</p>
        <input
          type="file"
          id="photo_file"
          accept="image/*"
          class="hidden"
          onchange="onPhotoSelected(this)"
        />
      </div>
    </div>
    <div class="mt-auto pt-6 border-t">
      <button
        id="extract_btn"
        onclick="startExtract()"
        class="agri-btn w-full text-white py-3 rounded-xl font-bold shadow-lg shadow-green-100 transition-all flex items-center justify-center space-x-2"
      >
        <i class="fas fa-magic"></i><span>提取视频</span>
      </button>
    </div>
  </main>
  <section class="flex-1 bg-green-50 p-8 overflow-y-auto">
    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-bold text-gray-800">视频生成流程</h2>
        <span
          id="gen_status_tag"
          class="status-tag text-xs px-3 py-1 rounded-full font-medium"
        >
          <i class="fas fa-clock mr-1"></i>待生成
        </span>
      </div>
      <div class="relative pl-12 space-y-6">
        <div
          id="card_1"
          class="process-card pending rounded-xl p-5 bg-white shadow-sm relative"
        >
          <div class="process-connector"></div>
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-semibold text-gray-800 mb-1">分析图片</h3>
              <p class="text-sm text-gray-500">解析图片内容、风格、主体特征</p>
            </div>
            <span
              id="badge_1"
              class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500"
              ><i class="fas fa-hourglass-half mr-1"></i>待执行</span
            >
          </div>
          <div
            class="mt-3 text-xs text-gray-400 border-t border-gray-100 pt-3"
            id="detail_1"
          ></div>
        </div>
        <div
          id="card_2"
          class="process-card pending rounded-xl p-5 bg-white shadow-sm relative"
        >
          <div class="process-connector"></div>
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-semibold text-gray-800 mb-1">匹配相关视频</h3>
              <p class="text-sm text-gray-500">
                基于图片特征匹配最优视频模板与素材
              </p>
            </div>
            <span
              id="badge_2"
              class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500"
              ><i class="fas fa-hourglass-half mr-1"></i>待执行</span
            >
          </div>
          <div
            class="mt-3 text-xs text-gray-400 border-t border-gray-100 pt-3"
            id="detail_2"
          ></div>
        </div>
        <div
          id="card_3"
          class="process-card pending rounded-xl p-5 bg-white shadow-sm relative"
        >
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-semibold text-gray-800 mb-1">生成最终视频</h3>
              <p class="text-sm text-gray-500">
                融合图片与匹配素材，生成完整视频
              </p>
            </div>
            <span
              id="badge_3"
              class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500"
              ><i class="fas fa-hourglass-half mr-1"></i>待执行</span
            >
          </div>
          <div
            class="mt-3 text-xs text-gray-400 border-t border-gray-100 pt-3"
            id="detail_3"
          ></div>
        </div>
      </div>
    </div>
  </section>
</div>

  </main>
  <section class="flex-1 bg-green-50 p-8 overflow-y-auto">
    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-bold text-gray-800">标题、封面与描述</h2>
        <span class="status-tag text-xs px-3 py-1 rounded-full font-medium"
          ><i class="fas fa-video mr-1"></i>视频已就绪</span
        >
      </div>
      <!-- 标题和封面 -->
      <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <h3 class="text-sm font-bold text-gray-700 mb-4">
          <span
            class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-green-100 text-green-700 text-xs font-bold mr-2"
            >6</span
          >标题和封面
        </h3>
        <div class="flex gap-6">
          <div class="flex-1 space-y-4">
            <div>
              <label class="text-xs text-gray-500 mb-1 block">视频标题</label>
              <div class="flex gap-2">
                <input
                  id="title_input"
                  type="text"

                <button

                  id="gen_title_btn"
                >
                  <i class="fas fa-magic text-xs"></i>一键生成标题

              </div>
            </div>

            <div>

          <textarea

        </div>
      </div>
      <!-- 发布状态 -->
      <div class="bg-white rounded-2xl shadow-sm p-6">
        <h3 class="text-sm font-bold text-gray-700 mb-4">
          <span
            class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-green-100 text-green-700 text-xs font-bold mr-2"

        </h3>
        <div id="platform_status_list" class="space-y-2">
          <p class="text-sm text-gray-400 text-center py-4">
            <i class="fas fa-info-circle mr-1"></i
            >请在左侧选择发布平台后点击发布
          </p>
        </div>
      </div>
    </div>
  </section>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
    <div class="toast-anim bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 text-sm font-medium">
        <i class="fas fa-check-circle text-green-400 text-lg"></i>
        <span>匹配完成，视频列表已展示</span>
    </div>
</div>

<!-- 生成后跳转 Loading -->
<div id="video_loading_overlay" class="loading-overlay hidden">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <p id="video_loading_text" class="text-sm text-gray-700 font-medium">视频生成完成，正在跳转发布配置...</p>
  </div>
</div>

<script>
const API_BASE_URL = '';
let uploadedImageId = null;
let uploadedImageRecord = null;
let selectedPhotoFile = null;
let matchedVideos = [];
let selectedRelationIds = [];
let generatedVideoUrl = '';
let uploadPreviewObjectUrl = null;

if (window.location.protocol === 'file:') {
    alert('请将页面放到 Spring Boot 的 static 目录并通过 http://localhost:8089/农智云播.html 访问，避免 file:// 导致跨域。');
}

function switchView(view) {
    const isAgent = view === 'agent';
    document.getElementById('view_agent').style.display = isAgent ? 'flex' : 'none';
    document.getElementById('view_publish').style.display = isAgent ? 'none' : 'flex';
}

function onPhotoSelected(input) {
    if (input.files && input.files[0]) {
        selectedPhotoFile = input.files[0];
        uploadedImageId = null;
        uploadedImageRecord = null;
        const previewEl = document.getElementById('upload_preview');
        if (uploadPreviewObjectUrl) {
            URL.revokeObjectURL(uploadPreviewObjectUrl);
        }
        uploadPreviewObjectUrl = URL.createObjectURL(input.files[0]);

async function uploadPhotoToBackend() {
    if (!selectedPhotoFile) {
        throw new Error('请先上传参考照片');
    }
    const formData = new FormData();
    formData.append('file', selectedPhotoFile);
    const response = await fetch(API_BASE_URL + '/api/images/upload', {
        method: 'POST',
        body: formData
    });
    if (!response.ok) {
        throw new Error('上传失败，HTTP状态码：' + response.status);
    }
    const result = await response.json();
    if (!result || result.code !== 0) {
        throw new Error((result && result.message) || '上传失败，请稍后重试');
    }
    const payload = result.data;
    if (!payload || typeof payload !== 'object') {
        throw new Error('上传接口返回格式错误：data 必须为对象');
    }
    if (!payload.id) {
        throw new Error('上传成功但未返回图片ID');
    }
    return payload;
}

function escapeHtml(text) {
    return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

async function searchVideosByImageId(imageId) {
    const response = await fetch(API_BASE_URL + '/api/video/search?imageId=' + encodeURIComponent(imageId), {
        method: 'GET'
    });
    if (!response.ok) {
        throw new Error('匹配视频失败，HTTP状态码：' + response.status);
    }
    const result = await response.json();
    if (!result || (result.code !== 0 && result.code !== '0')) {
        throw new Error((result && result.message) || '匹配视频失败，请稍后重试');
    }
    return Array.isArray(result.data) ? result.data : [];
}

async function generateFinalVideoBySelectedIds(relationIds) {

    });

    }

function normalizeGeneratedVideoUrl(videoUrl) {
    if (!videoUrl) {
        return '';
    }
    const rawUrl = String(videoUrl).trim();
    if (!rawUrl) {
        return '';
    }
    if (/^\/\//.test(rawUrl)) {
        return window.location.protocol + rawUrl;
    }
    if (/^https?:\/\//i.test(rawUrl)) {
        if (window.location.protocol === 'https:' && /^http:\/\//i.test(rawUrl)) {
            return rawUrl.replace(/^http:\/\//i, 'https://');
        }
        return rawUrl;
    }
    if (rawUrl.startsWith('/')) {
        return window.location.origin + rawUrl;
    }
    return rawUrl;
}

        return;

        if (!selectedRelationIds.includes(value)) {
            selectedRelationIds.push(value);
        }
    } else {
        selectedRelationIds = selectedRelationIds.filter(id => id !== value);
    }
    renderGenerateAction();
}

function invertMatchedVideoSelection() {
    const visibleIds = matchedVideos
        .slice(0, 5)
        .map(v => Number(v.id))
        .filter(Boolean);
    selectedRelationIds = visibleIds.filter(id => !selectedRelationIds.includes(id));

async function handleGenerateFinalVideo() {
    if (!selectedRelationIds.length) {
        alert('请先选择至少一个匹配视频');
        return;
    }
    const btn = document.getElementById('generate_final_btn');
    if (btn) {
        btn.disabled = true;
        btn.textContent = '生成中...';
    }
    const step = { card:'card_3', badge:'badge_3', detail:'detail_3', runLabel:'生成中...', doneLabel:'生成完成' };
    try {
        markStepRunning(step);
        showVideoLoading('正在生成最终视频，请稍候...');
        const videoUrl = await generateFinalVideoBySelectedIds(selectedRelationIds);
        if (!videoUrl) {
            throw new Error('生成成功但未返回视频链接');
        }
        generatedVideoUrl = normalizeGeneratedVideoUrl(videoUrl);
        if (!generatedVideoUrl) {
            throw new Error('生成成功但返回视频链接为空');
        }
        markStepDone(step, '生成成功，正在处理视频，请稍候...');
        document.getElementById('gen_status_tag').innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>处理中';
        if (btn) {
            btn.disabled = true;
            btn.textContent = '处理中...';
        }
        markStepDone(step, '生成完成，已获取视频链接');
        renderGeneratedVideoPreview(generatedVideoUrl);
        document.getElementById('gen_status_tag').innerHTML = '<i class="fas fa-check-circle mr-1"></i>已生成';
        updateVideoLoading('视频生成完成，正在进入发布配置页...');
        await new Promise(resolve => setTimeout(resolve, 3000));
        switchView('publish');
    } catch (error) {
        markStepFailed(step, (error && error.message) || '生成失败');
    } finally {
        hideVideoLoading();
        renderGenerateAction();
    }
}

async function startExtract() {
    if (!selectedPhotoFile) {
        alert('请先上传参考照片');
        return;
    }
    const btn = document.getElementById('extract_btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>处理中...';
    document.getElementById('gen_status_tag').innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>生成中';
    const steps = [
        { card:'card_1', badge:'badge_1', detail:'detail_1', runLabel:'上传中...', doneLabel:'分析完成', doneDetail:'图片已上传并完成分析' },
        { card:'card_2', badge:'badge_2', detail:'detail_2', runLabel:'匹配中...', doneLabel:'匹配完成', doneDetail:'已匹配相关视频素材' },
        { card:'card_3', badge:'badge_3', detail:'detail_3', runLabel:'生成中...', doneLabel:'待接入', doneDetail:'第三步暂不执行' },
    ];

    try {
        markStepRunning(steps[0]);
        uploadedImageRecord = await uploadPhotoToBackend();
        uploadedImageId = uploadedImageRecord.id;
        markStepDone(steps[0], '图片上传成功，正在生成分析结果...');
        renderAnalysisResult(uploadedImageRecord);

        markStepRunning(steps[1]);
        matchedVideos = await searchVideosByImageId(uploadedImageId);
        selectedRelationIds = [];
        markStepDone(steps[1], '已匹配 ' + matchedVideos.length + ' 个相关视频');
        renderMatchedVideos(matchedVideos);

        document.getElementById(steps[2].card).className = 'process-card pending rounded-xl p-5 bg-white shadow-sm relative';
        document.getElementById(steps[2].badge).innerHTML = '<i class="fas fa-pause-circle mr-1"></i>待接入';
        document.getElementById(steps[2].badge).className = 'text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500';
        renderGenerateAction();

        document.getElementById('gen_status_tag').innerHTML = '<i class="fas fa-check-circle mr-1"></i>匹配完成';
        const toast = document.getElementById('toast');
        toast.classList.remove('hidden');
        setTimeout(() => { toast.classList.add('hidden'); }, 1800);
    } catch (error) {
        document.getElementById('gen_status_tag').innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i>执行失败';
        const message = (error && error.message) || '流程执行失败';
        if (document.getElementById('badge_3').textContent.includes('生成中')) {
            markStepFailed(steps[2], message);
        } else if (document.getElementById('badge_2').textContent.includes('匹配中')) {
            markStepFailed(steps[1], message);
        } else {
            markStepFailed(steps[0], message);
        }
        alert(message);
    } finally {
        btn.innerHTML = '<i class="fas fa-magic mr-2"></i>提取视频';
        btn.disabled = false;
    }
}

        const bg = colors[Math.floor(Math.random()*colors.length)];
        document.getElementById('cover_preview_box').innerHTML = '<div style="background:'+bg+';width:100%;height:100%;border-radius:0.75rem;display:flex;flex-direction:column;align-items:center;justify-content:center;"><i class="fas fa-seedling" style="font-size:2.5rem;color:rgba(255,255,255,0.9);margin-bottom:8px;"></i><span style="font-size:0.7rem;color:rgba(255,255,255,0.9);font-weight:600;">AI生成封面</span></div>';
        btn.innerHTML = '<i class="fas fa-sync-alt text-xs"></i>重新生成'; btn.disabled = false;
    }, 1200);
}
function exportCover() { alert('封面已导出至下载目录'); }
function publishAll() {
    const platforms = [{id:'p_douyin',name:'抖音',icon:'fab fa-tiktok'},{id:'p_kuaishou',name:'快手',icon:'fas fa-bolt'},{id:'p_xiaohongshu',name:'小红书',icon:'fas fa-book-open'},{id:'p_shipinhao',name:'视频号',icon:'fab fa-weixin'},{id:'p_bilibili',name:'B站',icon:'fab fa-bilibili'}];
    const selected = platforms.filter(p => document.getElementById(p.id).checked);
    if (!selected.length) { alert('请先选择至少一个发布平台'); return; }
    if (!document.getElementById('title_input').value.trim()) { alert('请先填写或生成视频标题'); return; }
    const list = document.getElementById('platform_status_list');
    list.innerHTML = selected.map(p => '<div class="flex items-center justify-between p-3 rounded-xl bg-gray-50"><div class="flex items-center gap-2"><i class="'+p.icon+' text-gray-500"></i><span class="text-sm text-gray-700">'+p.name+'</span></div><span id="badge_'+p.id+'" class="text-xs px-2 py-1 rounded-full bg-yellow-100 text-yellow-700"><i class="fas fa-spinner fa-spin mr-1"></i>发布中</span></div>').join('');
    selected.forEach((p, i) => {
        setTimeout(() => {
            const badge = document.getElementById('badge_'+p.id);
            const ok = true;
            badge.outerHTML = ok
                ? '<span id="badge_'+p.id+'" class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700"><i class="fas fa-check-circle mr-1"></i>发布成功</span>'
                : '<span id="badge_'+p.id+'" class="text-xs px-2 py-1 rounded-full bg-red-100 text-red-600"><i class="fas fa-times-circle mr-1"></i>发布失败</span>';
        }, 1000 + i * 800);
    });
}
</script>
